<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DELA STAFF経理申請</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px;
      width: 100%;
      max-width: 360px;
    }
    h1 { font-size: 1.3rem; color: #1a202c; margin-bottom: 6px; }
    p { color: #718096; font-size: 0.88rem; margin-bottom: 28px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
    input[type=password] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #2d3748;
      background: #f7fafc;
      margin-bottom: 16px;
    }
    input[type=password]:focus { outline: none; border-color: #4a90e2; background: #fff; }
    button {
      width: 100%;
      padding: 11px;
      background: #4a90e2;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #357abd; }
    .error {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      background: #fed7d7;
      color: #9b2c2c;
      border-radius: 8px;
      font-size: 0.88rem;
      text-align: center;
    }
    .error.show { display: block; }

    @media (max-width: 480px) {
      .card { padding: 28px 16px; margin: 16px; }
      h1 { font-size: 1.15rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DELA STAFF経理申請</h1>
    <p>パスワードを入力してください</p>
    <form id="loginForm">
      <label>パスワード</label>
      <input type="password" id="password" placeholder="パスワードを入力" autofocus>
      <button type="submit">ログイン</button>
      <div class="error" id="error">パスワードが違います</div>
    </form>
  </div>
  <script>
    if (sessionStorage.getItem('authToken')) location.href = '/';
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      if (res.ok) {
        const { token } = await res.json();
        sessionStorage.setItem('authToken', token);
        location.href = '/';
      } else {
        document.getElementById('error').classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
